<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxVera | Premium E-Voting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <nav class="navbar glass">
        <div class="logo">VoxVera</div>
        <div class="nav-links" id="nav-links">
            <span id="user-display" class="hidden"></span>
            <button id="logout-btn" class="btn btn-outline hidden">Logout</button>
        </div>
    </nav>

    <main class="container">
        <!-- Auth Section -->
        <section id="auth-section" class="card glass active-section">
            <div class="auth-tabs" style="position:relative; z-index:100;">
                <button type="button" id="login-tab" class="tab-btn active">Login</button>
                <button type="button" id="register-tab" class="tab-btn">Register</button>
            </div>
            
            <form id="login-form" class="auth-form active">
                <h2>Welcome Back</h2>
                <div class="input-group">
                    <input type="text" id="login-username" required placeholder=" ">
                    <label>Username</label>
                </div>
                <div class="input-group">
                    <input type="password" id="login-password" required placeholder=" ">
                    <label>Password</label>
                </div>
                <button type="submit" class="btn btn-primary w-100">Sign In</button>
                <p id="login-error" class="error-text"></p>
            </form>

            <form id="register-form" class="auth-form hidden">
                <h2>Join the Future</h2>
                <div class="input-group">
                    <input type="text" id="reg-username" required placeholder=" ">
                    <label>Username</label>
                </div>
                <div class="input-group">
                    <input type="password" id="reg-password" required placeholder=" ">
                    <label>Password</label>
                </div>
                <button type="submit" class="btn btn-primary w-100">Create Account</button>
                <p id="reg-error" class="error-text"></p>
            </form>
        </section>

        <!-- Main Dashboard Section -->
        <section id="dashboard-section" class="hidden">
            <div class="dashboard-header">
                <h2>Active Polls</h2>
                <button id="show-create-poll-btn" class="btn btn-primary">+ New Poll</button>
            </div>

            <!-- Create Poll Modal/Section -->
            <div id="create-poll-card" class="card glass hidden">
                <h3>Create a New Poll</h3>
                <form id="create-poll-form">
                    <div class="input-group">
                        <input type="text" id="poll-question" required placeholder=" ">
                        <label>Poll Question</label>
                    </div>
                    <div id="poll-options-container">
                        <div class="input-group">
                            <input type="text" class="poll-option-input" required placeholder=" ">
                            <label>Option 1</label>
                        </div>
                        <div class="input-group">
                            <input type="text" class="poll-option-input" required placeholder=" ">
                            <label>Option 2</label>
                        </div>
                    </div>
                    <button type="button" id="add-option-btn" class="btn btn-text">+ Add Option</button>
                    <div class="form-actions">
                        <button type="button" id="cancel-create-btn" class="btn btn-outline">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create Poll</button>
                    </div>
                    <p id="create-poll-error" class="error-text"></p>
                </form>
            </div>

            <div id="polls-container" class="polls-grid">
                <!-- Polls will be injected here via JS -->
            </div>
        </section>
    </main>

    <script src="/js/app.js"></script>
</body>
</html>
